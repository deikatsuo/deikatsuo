name: Update Wakapi Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Generate Wakapi Stats
        env:
          WAKAPI_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
        run: |
          python -c "
          import json, requests, os
          from datetime import datetime
          
          # Fetch data from Wakapi
          api_key = os.environ['WAKAPI_API_KEY']
          url = f'https://wakapi.dev/api/v1/users/current/stats/last_30_days?api_key={api_key}'
          
          response = requests.get(url)
          
          if response.status_code != 200:
              print(f'Error: API returned status {response.status_code}')
              print(f'Response: {response.text}')
              exit(1)
          
          data = response.json()['data']
          
          # Format statistics with professional dashboard style
          stats = f'''
  ## 📊 Development Analytics
  
  > *Comprehensive coding statistics for the past 30 days*
  
  ### ⏱️ Time Overview
  | Metric | Value |
  |--------|-------|
  | **Total Time** | {data['human_readable_total']} |
  | **Daily Average** | {data['human_readable_daily_average']} |
  | **Days Tracked** | {data['days_including_holidays']} |
  
  ### 💻 Editor Usage
  | Rank | Editor | Time | Percentage |
  |------|--------|------|------------|
  {chr(10).join([f'| {i+1}. | {e["name"]} | {e["text"]} | {e["percent"]:.1f}% |' for i, e in enumerate(data['editors'][:5])])}
  
  ### 🖥️ Operating Systems
  | Rank | OS | Time | Percentage |
  |------|----|------|------------|
  {chr(10).join([f'| {i+1}. | {o["name"]} | {o["text"]} | {o["percent"]:.1f}% |' for i, o in enumerate(data['operating_systems'][:5])])}
  
  ### 📝 Programming Languages
  | Rank | Language | Time | Percentage |
  |------|----------|------|------------|
  {chr(10).join([f'| {i+1}. | {l["name"]} | {l["text"]} | {l["percent"]:.1f}% |' for i, l in enumerate(data['languages'][:8])])}
  
  ### 📂 Activity Categories
  | Rank | Category | Time | Percentage |
  |------|----------|------|------------|
  {chr(10).join([f'| {i+1}. | {c["name"]} | {c["text"]} | {c["percent"]:.1f}% |' for i, c in enumerate(data['categories'][:5])])}
  
  ---
  *Last Updated: {datetime.now().strftime('%B %d, %Y at %H:%M:%S %Z')}*
  '''
          
          # Read current README
          with open('README.md', 'r') as f:
              readme = f.read()
          
          # Replace content between tags
          start_tag = '<!-- WAKAPI_STATS_START -->'
          end_tag = '<!-- WAKAPI_STATS_END -->'
          
          if start_tag in readme and end_tag in readme:
              new_readme = readme.split(start_tag)[0] + start_tag + stats + end_tag + readme.split(end_tag)[1]
          else:
              new_readme = readme + f'\n\n{start_tag}\n{stats}\n{end_tag}'
          
          with open('README.md', 'w') as f:
              f.write(new_readme)
          
          print('README updated successfully with professional statistics!')
          "
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update professional Wakapi statistics"
          git push
