name: Update Wakapi Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  update-readme:
    name: Update README with Wakapi stats
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_BASE_URL: ${{ secrets.WAKAPI_BASE_URL }}
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_DAILY_TIME: "True"
          SHOW_PROJECTS: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_EDITORS: "True"          # 👈 Tampilkan editor
          SHOW_LANGUAGE: "True"          # 👈 Tampilkan bahasa
          SHOW_OS: "True"               # 👈 Tampilkan OS
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "True"
