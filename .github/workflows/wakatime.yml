name: Waka Readme

on:
  schedule:
    # Berjalan otomatis setiap jam 01:30 WIB
    - cron: '30 18 * * *'
  workflow_dispatch: # Supaya bisa di-klik manual kapan saja

jobs:
  update-readme:
    name: Update WakaReadme
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          API_BASE_URL: "https://wakapi.dev/api/v1" # Endpoint v1 untuk Wakapi
          REPOSITORY: ${{ github.repository }}
          SECTION_NAME: "waka"
          SHOW_TITLE: true
          BLOCKS: "█▓░"
