name: Update Wakapi Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests  # 👈 Tambahkan ini untuk install requests
      
      - name: Generate Wakapi Stats
        env:
          WAKAPI_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
        run: |
          python -c "
          import json, requests, os
          from datetime import datetime
          
          # Ambil data dari Wakapi
          url = 'https://wakapi.dev/api/v1/users/current/stats/last_30_days'
          headers = {'Authorization': f'Bearer {os.environ[\"WAKAPI_API_KEY\"]}'}
          response = requests.get(url, headers=headers)
          data = response.json()['data']
          
          # Format statistik
          stats = f'''
          ### 📊 Statistik Coding (30 Hari Terakhir)
          
          - **Total Waktu**: {data['human_readable_total']}
          - **Rata-rata Harian**: {data['human_readable_daily_average']}
          
          #### 💻 Editor Teratas
          {chr(10).join([f'  - {e[\"name\"]}: {e[\"text\"]} ({e[\"percent\"]:.1f}%)' for e in data['editors'][:3]])}
          
          #### 🖥️ OS Teratas
          {chr(10).join([f'  - {o[\"name\"]}: {o[\"text\"]} ({o[\"percent\"]:.1f}%)' for o in data['operating_systems'][:3]])}
          
          #### 📝 Bahasa Pemrograman Teratas
          {chr(10).join([f'  - {l[\"name\"]}: {l[\"text\"]} ({l[\"percent\"]:.1f}%)' for l in data['languages'][:5]])}
          
          #### 📁 Proyek Teratas
          {chr(10).join([f'  - {p[\"name\"]}: {p[\"text\"]} ({p[\"percent\"]:.1f}%)' for p in data['projects'][:3]])}
          
          ---
          *Diperbarui: {datetime.now().strftime('%d/%m/%Y %H:%M:%S')}*
          '''
          
          # Baca README saat ini
          with open('README.md', 'r') as f:
              readme = f.read()
          
          # Cari section WAKAPI_STATS dan ganti
          start_tag = '<!-- WAKAPI_STATS_START -->'
          end_tag = '<!-- WAKAPI_STATS_END -->'
          
          if start_tag in readme and end_tag in readme:
              # Ganti konten di antara tag
              new_readme = readme.split(start_tag)[0] + start_tag + stats + end_tag + readme.split(end_tag)[1]
          else:
              # Tambahkan section baru
              new_readme = readme + f'\n\n{start_tag}\n{stats}\n{end_tag}'
          
          # Tulis ulang README
          with open('README.md', 'w') as f:
              f.write(new_readme)
          "
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update Wakapi stats"
          git push
